<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Language AI</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
            width: 600px;
        }

        .box {
            margin-top: 20px;
            font-size: 24px;
            background: #1e293b;
            padding: 10px;
            display: inline-block;
            border-radius: 10px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .start {
            background: green;
            color: white;
        }

        .stop {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Sign Language Recognition</h1>

    <!-- Camera -->
    <img id="video" src="">

    <!-- Prediction -->
    <div class="box" id="prediction">Waiting...</div>

    <br>

    <!-- Controls -->
    <button class="start" onclick="start()">Start</button>
    <button class="stop" onclick="stop()">Stop</button>

    <script>
        function start() {
            fetch('/start');
            document.getElementById("video").src = "/video";
        }

        function stop() {
            fetch('/stop');
            document.getElementById("video").src = "";
            document.getElementById("prediction").innerText = "Stopped";
        }

        async function updatePrediction() {
            try {
                let res = await fetch('/prediction');
                let data = await res.json();
                document.getElementById("prediction").innerText = data.label;
            } catch {}
        }

        setInterval(updatePrediction, 500);
    </script>

</body>
</html>
